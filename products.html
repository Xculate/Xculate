<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>寻计工作室 · 产品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9faff 0%, #eef3fc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 24px 40px 24px;
        }

        /* ---------- 顶部导航栏 (完全沿用原风格) ---------- */
        .navbar {
            width: 100%;
            max-width: 1200px;
            margin: 24px 0 32px 0;
            padding: 12px 28px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 200px;
            box-shadow: 0 10px 30px -10px rgba(20, 40, 80, 0.2);
            border: 1px solid rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #1e2e5c, #2b3d75);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 20px;
            box-shadow: 0 8px 14px -4px rgba(30,46,92,0.3);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 650;
            background: linear-gradient(135deg, #1E2E5C, #2F427F);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 28px;
        }

        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: #1e2e5c;
            font-size: 16px;
            transition: 0.15s;
            border-bottom: 2px solid transparent;
            padding-bottom: 4px;
        }

        .nav-links a:hover {
            border-bottom-color: #4f8cff;
            color: #0a1a3a;
        }

        /* 当前页面高亮 (产品页) */
        .nav-links a.active {
            border-bottom-color: #1e2e5c;
            color: #0e1f3f;
            font-weight: 600;
        }

        .nav-placeholder {
            color: #4f658d;
            background: #eaf2ff;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #cddfff;
        }

        /* ---------- 页面标题 ---------- */
        .page-header {
            max-width: 1200px;
            width: 100%;
            margin-bottom: 32px;
            padding: 0 8px;
        }
        .page-header h2 {
            font-size: 32px;
            font-weight: 650;
            background: linear-gradient(145deg, #17284c, #314882);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            margin-right: 16px;
        }
        .page-header span {
            font-size: 18px;
            color: #3d5388;
            background: rgba(255,255,255,0.5);
            padding: 6px 16px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        /* ---------- 产品卡片网格 (完全基于原卡片风格扩展) ---------- */
        .products-grid {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 28px;
        }

        /* 每一个产品卡片都继承 .info-card / .studio-card 的混合风格 */
        .product-item {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 42px;
            border: 1px solid rgba(255,255,255,0.6);
            padding: 28px 26px 32px 26px;
            box-shadow: 0 25px 40px -18px rgba(0, 40, 80, 0.25);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .product-item:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 30px 50px -18px rgba(20, 60, 120, 0.35);
            transform: translateY(-3px);
        }

        .product-badge {
            display: inline-block;
            background: #1b2f56;
            color: white;
            font-size: 13px;
            font-weight: 500;
            padding: 5px 16px;
            border-radius: 40px;
            width: fit-content;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 0.3px;
        }

        .product-icon {
            font-size: 44px;
            margin-bottom: 12px;
            line-height: 1;
        }

        .product-name {
            font-size: 28px;
            font-weight: 700;
            color: #1b2f56;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .product-desc {
            color: #2d4270;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 24px;
            flex: 1;
            opacity: 0.9;
        }

        .product-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 22px;
            border-top: 2px dashed rgba(79, 140, 255, 0.2);
            padding-top: 18px;
        }

        .product-tag {
            background: #ffffffcc;
            border: 1px solid #b7ccf0;
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 12px;
            font-weight: 500;
            color: #1e2e5c;
        }

        .product-link-btn {
            background: #eaf2ff;
            border-radius: 100px;
            padding: 14px 10px;
            text-align: center;
            font-weight: 600;
            color: #1b2f56;
            border: 1px solid white;
            font-size: 16px;
            text-decoration: none;
            display: block;
            width: 100%;
            transition: background 0.15s;
            cursor: pointer; 
            border: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .product-link-btn:hover {
            background: #d1e2ff;
        }

        /* 保留的隐藏iframe (风格一致) */
        .hidden-iframe {
            display: none;
        }

        /* 响应式微调 */
        @media (max-width: 700px) {
            .navbar {
                border-radius: 40px;
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
                text-align: center;
            }
            .nav-links {
                justify-content: center;
            }
            .page-header {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部导航栏 (产品页高亮) -->
    <header class="navbar">
        <div class="logo-area">
            <div class="logo-mark">寻</div>
            <span class="logo-text">寻计工作室</span>
        </div>
        <div class="nav-links">
            <a href="./index.html">简介</a>
            <a href="./products.html" class="active">产品</a>   <!-- 当前页标记 -->
            <a href="./news.html">动态</a>
            <a href="./contact.html">联络</a>
        </div>
        <div class="nav-placeholder">XUN JI</div>
    </header>

    <!-- 产品列表页头部 (简短说明) -->
    <div class="page-header">
        <h2>产品系列</h2>
        <span></span>
    </div>

    <!-- 产品卡片网格 (完全基于原卡片风格) -->
    <div class="products-grid">
        <!-- 卡片 1: 翔云课堂管理系统 (主推) 使用原风格中的蓝色调 -->
        <div class="product-item">
            <span class="product-badge" style="background:#2563eb;">最新发布</span>
            <div class="product-icon">🌥️</div>
            <div class="product-name">翔云课堂<br>管理系统</div>
            <div class="product-desc">
                专为教育机构设计的轻量级课堂管理工具。支持排课、考勤、作业提醒，基于PyQt5构建，界面清爽。
            </div>
            <div class="product-meta">
                <span class="product-tag">#PyQt5</span>
                <span class="product-tag">#教育</span>
                <span class="product-tag">#v1.0.1</span>
            </div>
            <!-- 下载按钮 (类似原风格下载按钮，但改为可跳转的链接/示意) -->
            <a href="#" class="product-link-btn" id="productDownload1">⬇️ 下载体验 (140MB)</a>
            <!-- 保留一行小提示 (模仿原风格的辅助文字) -->
            <p style="font-size:12px; text-align:center; color:#5b6f95; margin-top: 12px;">目前仅支持 Windows</p>
        </div>

        
    </div>

    <!-- 保留隐藏iframe (无实际下载功能，仅用于维持原风格结构) -->
    <iframe style="display:none;" id="placeholder-iframe"></iframe>

    <script>
        (function() {
            // 轻量脚本：保留原风格的占位提示，同时让按钮点击执行你指定的跳转（可自行替换URL）
            console.log('产品列表页 — 所有卡片及按钮均可自由编辑');

            // 获取所有产品链接按钮 (class="product-link-btn")
            const btns = document.querySelectorAll('.product-link-btn');

            // 为每个按钮绑定点击事件 (你可以在此修改跳转地址)
            btns.forEach((btn, index) => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();   // 阻止a标签的默认跳转（如果href="#")
                    
                    // 此处可以自定义每个产品对应的链接
                    // 目前演示根据按钮文字或ID做简单提示并跳转占位
                    let url = '#';
                    const id = btn.id;
                    
                    // 你可以根据实际需求修改映射关系
                    if (id === 'productDownload1') {
                        url = 'https://xysys.netlify.app/';   // 翔云课堂演示站（示例链接，可替换）
                    }

                    // 模拟原风格的「下载中」效果 (可选)
                    if (btn.innerText.includes('下载') || btn.innerText.includes('体验')) {
                        const originalText = btn.innerText;
                        btn.innerText = '准备中...';
                        setTimeout(() => {
                            btn.innerText = originalText;
                        }, 1000);
                    }

                    // 打开新窗口或当前窗口（这里设定为新窗口/新标签）
                    if (url && url !== '#') {
                        window.open(url, '_blank');
                    } else {
                        alert('产品链接待完善 — 你可以替换脚本中的url');
                    }
                });
            });

            // 隐藏iframe完全占位
            const iframe = document.getElementById('placeholder-iframe');
            iframe.src = 'about:blank';
        })();
    </script>
    <!-- 额外的说明：完全遵循原风格的卡片、毛玻璃效果、导航栏，且内容已填充分产品卡片 -->
</body>
</html>
